name: Windows tests
run-name: Windows tests for ${{ inputs.tag || github.ref_name }}
on:
  push:
    tags:
      - 'php-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag version'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    name: Build
    steps:
      - name: Build
        run: |
          gh workflow run php.yml -R swoole/windows-builder -f tag="php-8.4"
