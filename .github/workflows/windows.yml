name: Windows tests
on: [push, pull_request]

jobs:
  windows-tests:
    name: Unit Test on Windows
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ 'windows-latest' ]
        ts: [ 'ts' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure git for phpt tests
        shell: cmd
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Setup PHP
        uses: shivammathur/setup-php@master
        with:
          php-version: '8.4'
          coverage: none
          extensions: curl,openssl,pdo,sockets
        env:
          phpts: ts

      - name: Cache PHP deps and devpack
        id: cache-php
        uses: actions/cache@v4
        with:
          path: |
            C:\tools\phpdev\deps
            C:\tools\phpdev\php-*-devel-*-*
          key: php84-${{ runner.os }}-${{ matrix.ts }}-v3
          restore-keys: |
            php84-${{ runner.os }}-${{ matrix.ts }}-
            php84-${{ runner.os }}-

      - name: Build Swoole extension
        uses: ./.github/workflows/winext
        with:
          ext-path: .
          tools-path: C:\tools\phpdev
          conf-args: --enable-swoole-curl --enable-swoole-thread
          staging-deps: '1'
          deps: openssl,libcurl,libssh2,zlib,nghttp2,libzstd,brotli

      - name: Show Swoole extension info
        shell: powershell
        run: |
          php -d extension=php_swoole --ri swoole

      - name: Install test dependencies
        shell: cmd
        run: |
          php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
          php composer-setup.php --quiet
          php composer.phar install --working-dir=tests\include\lib --no-interaction

      - name: Run unit tests
        shell: cmd
        run: |
          set PHPT=1
          set TEST_PHP_EXECUTABLE=php
          set SKIP_ONLINE_TESTS=1
          set NO_INTERACTION=1
          php tests\run-tests -P -q -d extension=php_swoole -d swoole.use_shortname=On --show-diff -g FAIL,BORK,LEAK,XLEAK --show-slow 1000 --set-timeout 300 tests\swoole_function tests\swoole_channel_coro tests\swoole_client_coro tests\swoole_coroutine tests\swoole_coroutine_lock tests\swoole_coroutine_scheduler tests\swoole_coroutine_system tests\swoole_coroutine_util tests\swoole_coroutine_wait_group tests\swoole_curl tests\swoole_event tests\swoole_global tests\swoole_http2_client_coro tests\swoole_http_client_coro tests\swoole_runtime tests\swoole_socket_coro tests\swoole_timer
