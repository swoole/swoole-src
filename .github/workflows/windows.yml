name: Windows tests
on: [push, pull_request]

jobs:
  windows-tests:
    name: Swoole Unit Test on Windows
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        os: [ 'windows-latest' ]
        ts: [ 'ts' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup PHP
        uses: shivammathur/setup-php@master
        with:
          php-version: '8.4'
          # ini-values: pcov.directory=lib
          # coverage: pcov
          coverage: none
          extensions: curl,openssl,pdo
        env:
          phpts: ts

      - name: Build Swoole extension
        run: |
          if (Test-Path ./ext/configure) { Remove-Item -Recurse -Force ./ext/configure }
          if (Test-Path ./ext/build) { Remove-Item -Recurse -Force ./ext/build }
          if (Test-Path ./ext/Makefile) { Remove-Item -Recurse -Force ./ext/Makefile }
        shell: powershell
      - name: Build Swoole extension (run)
        uses: ./.github/workflows/winext
        with:
          ext-path: ./ext
          tools-path: C:\tools\phpdev
          conf-args: --enable-swoole-curl --enable-swoole-thread
          staging-deps: '1'
          deps: openssl,libcurl,libssh2,zlib,nghttp2,libzstd,brotli
