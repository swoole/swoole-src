name: Windows tests
on: [push, pull_request]

jobs:
  windows-tests:
    name: Unit Test on Windows
    runs-on: windows-2022
    if: "!contains(github.event.head_commit.message, '--filter=') || contains(github.event.head_commit.message, '[win-unit]')"
    strategy:
      fail-fast: false
      matrix:
        os: [ 'windows-2022' ]
        ts: [ 'ts' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Configure git for phpt tests
        shell: cmd
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          extensions: curl,openssl,pdo,sockets
        env:
          phpts: ts

      - name: Cache PHP deps and devpack
        id: cache-php
        uses: actions/cache@v6
        with:
          path: |
            C:\tools\phpdev\deps
            C:\tools\phpdev\php-*-devel-*-*
          key: php84-${{ runner.os }}-${{ matrix.ts }}-v3
          restore-keys: |
            php84-${{ runner.os }}-${{ matrix.ts }}-
            php84-${{ runner.os }}-

      - name: Build Swoole extension
        uses: ./.github/workflows/winext
        with:
          ext-path: .
          tools-path: C:\tools\phpdev
          conf-args: --enable-swoole-curl --enable-swoole-thread
          staging-deps: '1'
          deps: openssl,libcurl,libssh2,zlib,nghttp2,libzstd,brotli

      - name: Show Swoole extension info
        shell: powershell
        run: |
          php -d extension=php_swoole.dll --ri swoole

      - name: Install test dependencies
        shell: cmd
        run: |
          php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');"
          php composer-setup.php --quiet
          php composer.phar install --working-dir=tests\include\lib --no-interaction

      - name: Run unit tests
        shell: cmd
        run: |
          set PHPT=1
          set TEST_PHP_EXECUTABLE=php
          set NO_INTERACTION=1
          php tests\run-tests -P -q -d extension=php_swoole.dll -d swoole.use_shortname=On --show-diff -g FAIL,BORK,LEAK,XLEAK --show-slow 1000 --set-timeout 300 tests\swoole_windows\bootstrap.phpt tests\swoole_windows\free_port.phpt tests\swoole_windows\local_ip.phpt tests\swoole_windows\local_mac.phpt tests\swoole_windows\code tests\swoole_function
